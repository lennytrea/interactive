<body>
    <main>
    <h1>Join the Ranch Crew</h1>
    <p>Create an account to start booking your trail rides.</p>

    <form class="auth-form">
        <div class="form-group">
            <label for="regName">Full Name</label>
            <input type="text" id="regName" placeholder="Arthur Morgan" required>
        </div>

        <div class="form-group">
            <label for="regEmail">Email Address</label>
            <input type="email" id="regEmail" placeholder="cowboy@ranch.com" required>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="regPass">Password</label>
                <input type="password" id="regPass" placeholder="••••••••" required>
            </div>
            <div class="form-group">
                <label for="confirmPass">Confirm Password</label>
                <input type="password" id="confirmPass" placeholder="••••••••" required>
            </div>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="terms" required>
            <label for="terms">I agree to the Ranch Code of Conduct & Terms</label>
        </div>

        <button type="submit">Create Account</button>
    </form>
</main>
</body>
</html>
